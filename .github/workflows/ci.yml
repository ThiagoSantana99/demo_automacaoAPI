name: api-tests

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PAGES_DESTINATION_DIR: reports

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run tests
        id: tests
        continue-on-error: true
        run: mvn -B clean test

      - name: Generate Allure report
        if: always() && hashFiles('target/allure-results/**') != ''
        run: mvn -B allure:report

      - name: Upload Allure report
        if: always() && hashFiles('target/site/allure-maven/**') != ''
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: target/site/allure-maven

      - name: Upload Allure results
        if: always() && hashFiles('target/allure-results/**') != ''
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: target/allure-results

      - name: Publish Allure report to GitHub Pages
        if: always() && github.event_name == 'push'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: target/site/allure-maven
          destination_dir: ${{ env.PAGES_DESTINATION_DIR }}
          keep_files: true

      - name: Fail job when tests fail
        if: steps.tests.outcome == 'failure'
        run: exit 1
