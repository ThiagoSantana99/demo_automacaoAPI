name: Publish Reports

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run tests
        run: mvn -B clean test

      - name: Install Allure CLI
        run: npm install -g allure-commandline --no-audit --no-fund

      - name: Generate Allure report
        run: allure generate target/allure-results --clean -o target/allure-report

      - name: Generate JavaDoc
        run: mvn -B -DskipTests javadoc:javadoc

      - name: Prepare GitHub Pages content
        run: |
          mkdir -p target/pages/reports
          mkdir -p target/pages/javadoc
          cp README.md target/pages/README.md
          cp -R target/allure-report/. target/pages/reports/
          JAVADOC_DIR=""
          if [ -d "target/apidocs" ]; then
            JAVADOC_DIR="target/apidocs"
          elif [ -d "target/site/apidocs" ]; then
            JAVADOC_DIR="target/site/apidocs"
          fi
          if [ -n "$JAVADOC_DIR" ]; then
            cp -R "$JAVADOC_DIR"/. target/pages/javadoc/
          else
            echo "JavaDoc directory not found. Skipping JavaDoc copy."
          fi
          cat <<'EOF' > target/pages/index.html
          <!DOCTYPE html>
          <html lang="pt-BR">
          <head>
              <meta charset="UTF-8">
              <meta http-equiv="refresh" content="0; url=README.md">
              <title>Redirecting...</title>
          </head>
          <body>
              <p>Redirecionando para o README do projeto...</p>
              <p><a href="README.md">Abrir README</a></p>
          </body>
          </html>
          EOF

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
