name: javadocs

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'src/test/java/**'
      - 'pom.xml'
      - '.github/workflows/javadoc.yml'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      PAGES_DESTINATION_DIR: javadoc

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Generate test Javadocs
        run: mvn -B -q clean test-compile javadoc:test-javadoc

      - name: Upload Javadocs artifact
        uses: actions/upload-artifact@v4
        with:
          name: javadocs
          path: target/reports/testapidocs/

      - name: Publish Javadocs to GitHub Pages
        if: github.event_name == 'push'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: target/reports/testapidocs/
          destination_dir: ${{ env.PAGES_DESTINATION_DIR }}
          keep_files: true
