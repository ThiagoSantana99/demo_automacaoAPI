name: Generate JavaDoc

permissions:
  contents: write

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  javadoc:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Generate JavaDoc
        run: mvn javadoc:javadoc

      - name: Prepare javadoc folder
        run: |
          mkdir -p public/javadoc
          if [ -d "target/apidocs" ]; then
            cp -r target/apidocs/. public/javadoc/
          elif [ -d "target/site/apidocs" ]; then
            cp -r target/site/apidocs/. public/javadoc/
          else
            echo "JavaDoc directory not found."
            exit 1
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public