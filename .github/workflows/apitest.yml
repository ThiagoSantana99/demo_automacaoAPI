name: Publish Allure Report

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run tests
        id: tests
        continue-on-error: true
        run: mvn -B clean test

      - name: Install Allure CLI
        run: npm install -g allure-commandline --no-audit --no-fund

      - name: Generate Allure report
        if: always()
        run: allure generate target/allure-results --clean -o target/allure-report

      - name: Prepare GitHub Pages content
        if: always()
        run: |
          mkdir -p target/pages/reports
          cp README.md target/pages/README.md
          cp -R target/allure-report/. target/pages/reports/
          cat <<'EOF' > target/pages/index.html
          <!DOCTYPE html>
          <html lang="pt-BR">
          <head>
              <meta charset="UTF-8">
              <meta http-equiv="refresh" content="0; url=README.md">
              <title>Redirecting...</title>
          </head>
          <body>
              <p>Redirecionando para o README do projeto...</p>
              <p><a href="README.md">Abrir README</a></p>
          </body>
          </html>
          EOF

      - name: Configure GitHub Pages
        if: always()
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/pages

      - name: Deploy to GitHub Pages
        if: always() && github.event_name == 'push'
        uses: actions/deploy-pages@v4

      - name: Fail job when tests fail
        if: steps.tests.outcome == 'failure'
        run: exit 1
